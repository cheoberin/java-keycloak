spring:
  datasource:
    url: ${DEV_DB_URL}/${DEV_DB_NAME}
    username: ${DEV_DB_USER}
    password: ${DEV_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate.format_sql: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false